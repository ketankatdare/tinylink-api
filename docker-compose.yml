services:
  postgres:
    image: postgres:17-alpine
    container_name: tinylink-postgres
    environment:
      POSTGRES_DB: tinylink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - tinylink-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tinylink"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tinylink-postgres-data:
